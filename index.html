<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibe Chat</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="chat-container">
  <header class="chat-header">✨ Vibe Chat ✨</header>
  <main class="chat-messages" id="messages">
    <div class="message bot">Привет! Добро пожаловать в вайб-чат 🌿</div>
  </main>
  <form id="chat-form" class="chat-input">
    <input type="text" id="user-input" placeholder="Напиши сообщение..." autocomplete="off" />
    <button type="submit">➤</button>
  </form>
</div>
<script src="script.js"></script>
</body>
</html>
